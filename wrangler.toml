# Cloudflare Pages configuration
name = "welcome-hub"
compatibility_date = "2024-12-01"

# Pages will auto-detect:
# - Static assets from dist/ (after vite build)
# - Functions from functions/ directory
# - Env vars from Cloudflare dashboard

